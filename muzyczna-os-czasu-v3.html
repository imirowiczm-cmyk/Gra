<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Muzyczna Oś Czasu — gra imprezowa</title>
<style>
  :root{
    --bg:#0E0B1E; --panel:#1B1533; --panel2:#241C44;
    --ink:#F2EFFA; --muted:#8D85AC;
    --hot:#FF3D8A; --amber:#FFC24B; --ok:#2EE6A8; --bad:#FF5C5C;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100%; overscroll-behavior:none;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  #app{max-width:520px; margin:0 auto; padding:16px 16px 32px; min-height:100vh; display:flex; flex-direction:column;}

  h1{font-size:34px; font-weight:900; letter-spacing:-0.5px; line-height:1.05; margin:8px 0 4px;}
  h2{font-size:22px; font-weight:800; margin:0 0 6px;}
  .sub{color:var(--muted); font-size:14px; margin:0 0 18px;}

  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .brand{font-weight:900; letter-spacing:2px; font-size:12px; color:var(--muted); text-transform:uppercase;}
  .wake{font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .wake .dot{width:8px; height:8px; border-radius:50%; background:var(--bad);}
  .wake.on .dot{background:var(--ok); box-shadow:0 0 8px var(--ok);}

  .card{background:var(--panel); border-radius:var(--radius); padding:18px; margin-bottom:14px;}

  .btn{display:block; width:100%; border:none; border-radius:16px; padding:17px 18px;
    font-size:17px; font-weight:800; color:#14102A; background:var(--amber);
    cursor:pointer; margin-top:10px; transition:transform .08s;}
  .btn:active{transform:scale(.97);}
  .btn.hot{background:var(--hot); color:#fff;}
  .btn.ghost{background:var(--panel2); color:var(--ink);}
  .btn.ok{background:var(--ok);}
  .btn.small{padding:11px 14px; font-size:14px; border-radius:12px;}
  .btn:disabled{opacity:.35;}
  .row{display:flex; gap:10px;}
  .row .btn{margin-top:10px;}

  /* setup */
  .stepper{display:flex; align-items:center; gap:14px; margin:6px 0 14px;}
  .stepper button{width:54px; height:54px; border-radius:50%; border:none; font-size:26px; font-weight:900;
    background:var(--panel2); color:var(--ink); cursor:pointer;}
  .stepper .num{font-size:40px; font-weight:900; min-width:64px; text-align:center;}
  input[type=text]{width:100%; background:var(--panel2); border:none; border-radius:12px;
    padding:14px; color:var(--ink); font-size:16px; margin-bottom:8px; font-weight:600;}
  input[type=text]::placeholder{color:var(--muted);}
  .opt{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #2c2452;}
  .opt:last-child{border-bottom:none;}
  .opt .lbl{font-weight:700; font-size:15px;}
  .opt .hint{color:var(--muted); font-size:12px; margin-top:2px;}
  .toggle{width:56px; height:32px; border-radius:16px; background:var(--panel2); border:none; position:relative; cursor:pointer;}
  .toggle::after{content:""; position:absolute; top:4px; left:4px; width:24px; height:24px; border-radius:50%;
    background:var(--muted); transition:all .15s;}
  .toggle.on{background:var(--ok);}
  .toggle.on::after{left:28px; background:#14102A;}
  .mini-stepper{display:flex; align-items:center; gap:8px;}
  .mini-stepper button{width:34px; height:34px; border-radius:10px; border:none; background:var(--panel2);
    color:var(--ink); font-size:18px; font-weight:900; cursor:pointer;}
  .mini-stepper span{font-weight:900; font-size:18px; min-width:26px; text-align:center;}
  .setpick{display:flex; gap:10px;}
  .setbtn{flex:1; background:var(--panel2); border:2px solid #322a5e; border-radius:14px;
    padding:14px 12px; color:var(--ink); text-align:left; cursor:pointer;}
  .setbtn.sel{border-color:var(--hot); background:rgba(255,61,138,.12);}
  .setbtn .n{font-weight:900; font-size:15px; line-height:1.25;}
  .setbtn .d{font-size:11.5px; color:var(--muted); margin-top:5px; line-height:1.35;}

  /* turn banner */
  .turnbanner{text-align:center; padding:26px 16px;}
  .turnbanner .who{font-size:38px; font-weight:900; color:var(--amber); margin:6px 0;}
  .turnbanner .meta{color:var(--muted); font-size:14px;}
  .tokens{display:inline-flex; gap:5px; margin-top:8px;}
  .token{width:18px; height:18px; border-radius:50%; background:var(--hot); box-shadow:0 0 6px rgba(255,61,138,.6);}

  /* vinyl + player */
  .vinyl{width:200px; height:200px; margin:16px auto 8px; border-radius:50%; position:relative;
    background:repeating-radial-gradient(circle at center, #1a1a1f 0 2px, #26262e 2px 4px);
    box-shadow:0 10px 40px rgba(0,0,0,.6); animation:spin 3.2s linear infinite; animation-play-state:paused;}
  .vinyl.playing{animation-play-state:running;}
  .vinyl::before{content:""; position:absolute; top:50%; left:50%; width:70px; height:70px;
    transform:translate(-50%,-50%); border-radius:50%; background:var(--hot); z-index:1;}
  .vinyl .center{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:30px; color:#14102A; z-index:2; font-weight:900;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .progress{height:8px; border-radius:4px; background:var(--panel2); margin:14px 4px 4px; overflow:hidden;}
  .progress > div{height:100%; width:0%; background:linear-gradient(90deg,var(--hot),var(--amber)); border-radius:4px;}
  .listen-status{text-align:center; color:var(--muted); font-size:13px; margin-top:8px; min-height:18px;}

  .secret{background:var(--panel2); border-radius:14px; padding:16px; text-align:center; margin-top:12px;}
  .secret .artist{font-size:22px; font-weight:900;}
  .secret .title{font-size:17px; color:var(--amber); font-weight:700; margin-top:2px;}
  .warn{background:rgba(255,92,92,.12); border:1px solid rgba(255,92,92,.4); color:#ffb3b3;
    border-radius:12px; padding:10px 14px; font-size:13px; font-weight:700; text-align:center; margin-bottom:12px;}

  /* timeline */
  .tl-wrap{overflow-x:auto; padding:14px 4px; -webkit-overflow-scrolling:touch;}
  .tl{display:flex; align-items:stretch; gap:0; min-width:min-content; padding:4px 8px;}
  .tl-card{flex:0 0 auto; width:104px; background:var(--panel2); border-radius:14px; padding:10px 8px;
    text-align:center; border:2px solid #322a5e;}
  .tl-card .y{font-size:26px; font-weight:900; color:var(--amber);}
  .tl-card .a{font-size:11px; font-weight:700; margin-top:4px; line-height:1.2;}
  .tl-card .t{font-size:10px; color:var(--muted); margin-top:2px; line-height:1.2;}
  .slot{flex:0 0 auto; width:44px; display:flex; align-items:center; justify-content:center;}
  .slot button{width:36px; height:76px; border-radius:12px; border:2px dashed #4a3f85; background:transparent;
    color:#8d85ac; font-size:20px; font-weight:900; cursor:pointer;}
  .slot button.sel{border-style:solid; border-color:var(--hot); background:rgba(255,61,138,.18); color:var(--hot);}
  .tl-label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px;
    display:flex; justify-content:space-between; padding:0 10px;}

  /* reveal */
  .reveal{text-align:center; padding:10px 0 4px;}
  .reveal .bigyear{font-size:72px; font-weight:900; line-height:1;}
  .reveal .song{font-size:18px; font-weight:800; margin-top:8px;}
  .reveal .art{color:var(--muted); font-size:15px;}
  .verdict{font-size:26px; font-weight:900; margin-top:14px;}
  .verdict.ok{color:var(--ok);} .verdict.bad{color:var(--bad);}

  .scorebar{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;}
  .chip{background:var(--panel); border-radius:12px; padding:8px 12px; font-size:13px; font-weight:700;}
  .chip b{color:var(--amber);}
  .chip.now{outline:2px solid var(--hot);}

  .confetti{font-size:56px; text-align:center;}
  .winner{font-size:40px; font-weight:900; color:var(--amber); text-align:center; margin:6px 0;}

  details{background:var(--panel); border-radius:var(--radius); padding:14px 18px; margin-bottom:14px;}
  summary{font-weight:800; cursor:pointer; font-size:15px;}
  details p, details li{font-size:13.5px; color:#c9c3e2; line-height:1.5;}
  .spacer{flex:1;}
</style>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function draw(){
  if(!S.deck.length){ S.deck = shuffle(S.discard.splice(0)); }
  return S.deck.pop();
}
function spotify(song){
  const q = encodeURIComponent(song[0] + " " + song[1]);
  window.open("https://open.spotify.com/search/" + q, "_blank");
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}

/* ============ WYSZUKIWANIE FRAGMENTÓW AUDIO (Deezer → iTunes) ============ */
const previewCache = new Map();

function jsonp(url, timeout=7000){
  return new Promise((resolve, reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const s = document.createElement("script");
    const timer = setTimeout(()=>{ cleanup(); reject(new Error("timeout")); }, timeout);
    function cleanup(){ try{ delete window[cb]; }catch(e){} s.remove(); clearTimeout(timer); }
    window[cb] = data => { cleanup(); resolve(data); };
    s.onerror = () => { cleanup(); reject(new Error("load error")); };
    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
    document.head.appendChild(s);
  });
}

const CACHE_TTL = 10*60*1000; // linki CDN wygasają — nie ufaj im dłużej niż 10 min

async function deezerSearch(q){
  const d = await jsonp("https://api.deezer.com/search?output=jsonp&limit=3&q=" + encodeURIComponent(q));
  return (d && d.data && d.data.length && d.data[0].preview) ? d.data[0].preview : null;
}
async function itunesSearch(term){
  try{
    const d = await jsonp("https://itunes.apple.com/search?media=music&entity=song&limit=3&term=" + encodeURIComponent(term));
    if(d && d.results && d.results.length && d.results[0].previewUrl) return d.results[0].previewUrl;
  }catch(e){}
  try{
    const r = await fetch("https://itunes.apple.com/search?media=music&entity=song&limit=3&term=" + encodeURIComponent(term));
    const d = await r.json();
    if(d && d.results && d.results.length && d.results[0].previewUrl) return d.results[0].previewUrl;
  }catch(e){}
  return null;
}

/* Zwraca LISTĘ kandydatów (Deezer + iTunes) — gdy jeden padnie, gra przełącza się na drugi */
async function findPreviews(song, fresh=false){
  const key = song[0] + "|" + song[1];
  const hit = previewCache.get(key);
  if(!fresh && hit && (Date.now() - hit.t) < CACHE_TTL && hit.urls.length) return hit.urls;

  const term = song[0] + " " + song[1];
  const [dz, it] = await Promise.all([
    (async ()=>{
      try{ const u = await deezerSearch('artist:"' + song[0] + '" track:"' + song[1] + '"'); if(u) return u; }catch(e){}
      try{ return await deezerSearch(term); }catch(e){}
      return null;
    })(),
    itunesSearch(term)
  ]);
  const urls = [dz, it].filter(Boolean);
  previewCache.set(key, {urls, t: Date.now()});
  return urls;
}

let previewReq = 0; // chroni przed wyścigiem przy skip/next
function prefetchPreview(fresh=false){
  S.preview = undefined;
  S.candIdx = 0;
  const req = ++previewReq;
  findPreviews(S.song, fresh).then(urls=>{
    if(req !== previewReq) return;
    S.preview = urls.length ? urls : null;
    if(S.screen === "listen"){
      render();
      if(fresh && S.preview) playPreview(); // wznów po odświeżeniu linku
    }
  });
}

/* ============ ODTWARZACZ ============ */
const player = new Audio();
player.preload = "auto";
let isPlaying = false;
let triedFresh = false;

player.addEventListener("ended", ()=>{ isPlaying = false; syncPlayerUI(); });
player.addEventListener("pause", ()=>{ isPlaying = false; syncPlayerUI(); });
player.addEventListener("play",  ()=>{ isPlaying = true;  syncPlayerUI(); setListenStatus("🎵 Gra… (fragment ~30 s)"); });
player.addEventListener("timeupdate", ()=>{
  const bar = document.getElementById("pbar");
  if(bar && player.duration) bar.style.width = (player.currentTime / player.duration * 100) + "%";
});
player.addEventListener("error", ()=>handleAudioFail());
player.addEventListener("stalled", ()=>{ setListenStatus("⏳ Wolne łącze — dźwięk się buforuje…"); });

function setListenStatus(msg){
  const el = document.getElementById("lStatus");
  if(el) el.textContent = msg;
}

function playPreview(){
  if(!Array.isArray(S.preview) || !S.preview.length) return;
  const url = S.preview[S.candIdx];
  if(player.src !== url){ player.src = url; }
  const pr = player.play();
  if(pr && pr.catch) pr.catch(()=>handleAudioFail());
}

/* Gdy audio nie chce grać: 1) zapasowe źródło → 2) świeży link → 3) jasny komunikat */
function handleAudioFail(){
  if(S.screen !== "listen" || !Array.isArray(S.preview)) return;
  if(S.candIdx < S.preview.length - 1){
    S.candIdx++;
    setListenStatus("🔁 Zmieniam źródło dźwięku…");
    playPreview();
  } else if(!triedFresh){
    triedFresh = true;
    setListenStatus("🔄 Link wygasł — pobieram świeży…");
    prefetchPreview(true);
  } else {
    setListenStatus("❌ Nie mogę odtworzyć tego utworu — tapnij ▶ Graj jeszcze raz albo pomiń utwór.");
  }
}

function stopPreview(){ try{ player.pause(); player.currentTime = 0; }catch(e){} }
function syncPlayerUI(){
  const v = document.getElementById("vinyl");
  const b = document.getElementById("playBtn");
  if(v) v.classList.toggle("playing", isPlaying);
  if(b) b.textContent = isPlaying ? "⏸ Pauza" : "▶ Graj";
}

/* ============ WAKE LOCK ============ */
let wakeLock = null;
async function keepAwake(){
  try{
    if("wakeLock" in navigator){
      wakeLock = await navigator.wakeLock.request("screen");
      setWake(true);
      wakeLock.addEventListener("release", ()=>setWake(false));
    } else setWake(false, "brak API");
  }catch(e){ setWake(false); }
}
function setWake(on, txt){
  const el = document.getElementById("wake");
  el.classList.toggle("on", !!on);
  document.getElementById("wakeTxt").textContent = on ? "nie zgaśnie" : (txt || "ekran zgaśnie");
}
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible" && S.screen!=="setup") keepAwake(); });

/* ---- komponenty ---- */
function timelineView(tl, interactive=false){
  let inner = "";
  if(interactive){
    inner += slotBtn(0);
    tl.forEach((s,i)=>{ inner += tlCard(s); inner += slotBtn(i+1); });
  } else {
    tl.forEach(s=>{ inner += tlCard(s); });
    if(!tl.length) inner = `<div class="sub" style="padding:10px;">pusta oś czasu</div>`;
  }
  return `
  <div class="card" style="padding:8px 0;">
    <div class="tl-label"><span>← starsze</span><span>oś czasu</span><span>nowsze →</span></div>
    <div class="tl-wrap"><div class="tl">${inner}</div></div>
  </div>`;
}
function tlCard(s){
  const film = isFilm();
  return `<div class="tl-card">
    <div class="y">${s[2]}</div>
    <div class="a">${esc(film ? "🎬 " + s[3] : s[0])}</div>
    <div class="t">${esc(film ? s[0] : s[1])}</div>
  </div>`;
}
function slotBtn(i){
  return `<div class="slot"><button data-slot="${i}" class="${S.slot===i?"sel":""}">+</button></div>`;
}
function scorebar(){
  return `<div class="scorebar">${S.players.map((p,i)=>
    `<div class="chip ${i===S.cur?"now":""}">${esc(p.name)} <b>${p.timeline.length}</b>${S.tokensOn?` · 🎤${p.tokens}`:""}</div>`).join("")}</div>`;
}

/* ============ LOGIKA ============ */
function startGame(){
  S.players = [];
  for(let i=0;i<S.nPlayers;i++){
    const v = ($("#name"+i)?.value || "").trim();
    S.players.push({name: v || ("Gracz "+(i+1)), tokens: S.tokensOn?2:0, timeline:[]});
  }
  S.deck = shuffle([...SETS[S.set].songs]);
  S.discard = [];
  S.players.forEach(p => p.timeline.push(draw()));
  S.cur = 0;
  newTurn();
  keepAwake();
}
function newTurn(){
  stopPreview();
  S.song = draw();
  S.claims = false;
  S.slot = null;
  S.screen = "turn";
  triedFresh = false;
  prefetchPreview();
  render();
}
function checkPlacement(tl, slot, year){
  const left = slot>0 ? tl[slot-1][2] : -Infinity;
  const right = slot<tl.length ? tl[slot][2] : Infinity;
  return year>=left && year<=right;
}
function confirmPlacement(){
  stopPreview();
  const p = S.players[S.cur];
  const ok = checkPlacement(p.timeline, S.slot, S.song[2]);
  S.lastCorrect = ok;
  if(ok){ p.timeline.splice(S.slot, 0, S.song); }
  else { S.discard.push(S.song); }
  S.screen = "reveal";
  render();
}
function nextTurn(){
  const p = S.players[S.cur];
  if(p.timeline.length >= S.target){ S.screen = "win"; render(); return; }
  S.cur = (S.cur+1) % S.players.length;
  newTurn();
}
function skipSong(cost){
  const p = S.players[S.cur];
  if(cost > 0){
    if(p.tokens < cost) return;
    p.tokens -= cost;
  }
  stopPreview();
  triedFresh = false;
  S.discard.push(S.song);
  S.song = draw();
  prefetchPreview();
  render();
}

/* ============ ZDARZENIA ============ */
function bind(){
  const on = (id, fn) => { const e = document.getElementById(id); if(e) e.onclick = fn; };

  if(S.screen==="setup"){
    on("pMinus", ()=>{ S.nPlayers=Math.max(2,S.nPlayers-1); render(); });
    on("pPlus",  ()=>{ S.nPlayers=Math.min(10,S.nPlayers+1); render(); });
    on("tMinus", ()=>{ S.target=Math.max(4,S.target-1); $("#tNum").textContent=S.target; });
    on("tPlus",  ()=>{ S.target=Math.min(15,S.target+1); $("#tNum").textContent=S.target; });
    on("tokTgl", ()=>{ S.tokensOn=!S.tokensOn; $("#tokTgl").classList.toggle("on",S.tokensOn); });
    document.querySelectorAll("[data-set]").forEach(b=>{
      b.onclick = ()=>{ S.set = b.dataset.set; render(); };
    });
    on("soundTest", runSoundTest);
    on("start", startGame);
  }
  if(S.screen==="turn"){
    on("toListen", ()=>{
      S.screen="listen"; render();
      // auto-start, jeśli fragment już gotowy (tap = gest użytkownika)
      if(Array.isArray(S.preview) && S.preview.length) playPreview();
    });
    on("freeCard", ()=>{
      const p = S.players[S.cur];
      if(p.tokens<3) return;
      p.tokens -= 3;
      const idx = p.timeline.findIndex(c => c[2] > S.song[2]);
      if(idx===-1) p.timeline.push(S.song); else p.timeline.splice(idx,0,S.song);
      if(p.timeline.length >= S.target){ S.screen="win"; render(); return; }
      S.cur = (S.cur+1)%S.players.length;
      newTurn();
    });
  }
  if(S.screen==="listen"){
    on("playBtn", ()=>{ if(isPlaying) player.pause(); else playPreview(); });
    on("rewBtn", ()=>{ player.currentTime = 0; playPreview(); });
    on("skip", ()=>skipSong(1));
    on("freeSkip", ()=>skipSong(0));
    on("toDjFb", ()=>{ S.screen="djfb"; render(); });
    on("toPlace", ()=>{
      if(S.preview===undefined) return;
      if(S.preview===null){ S.screen="djfb"; render(); return; }
      S.screen="place"; render();
    });
  }
  if(S.screen==="djfb"){
    on("spot", ()=>spotify(S.song));
    on("toPlace2", ()=>{ S.screen="place"; render(); });
  }
  if(S.screen==="place"){
    document.querySelectorAll("[data-slot]").forEach(b=>{
      b.onclick = ()=>{ S.slot = parseInt(b.dataset.slot); render(); };
    });
    on("claimTgl", ()=>{ S.claims=!S.claims; $("#claimTgl").classList.toggle("on",S.claims); });
    on("confirm", confirmPlacement);
  }
  if(S.screen==="reveal"){
    on("claimYes", ()=>{
      const p=S.players[S.cur];
      p.tokens = Math.min(5, p.tokens+1);
      S.claims=false; render();
    });
    on("claimNo", ()=>{ S.claims=false; render(); });
    on("next", nextTurn);
  }
  if(S.screen==="win"){
    on("again", ()=>{
      S.players.forEach(p=>{ p.timeline=[]; p.tokens=S.tokensOn?2:0; });
      S.deck = shuffle([...SETS[S.set].songs]);
      S.discard=[];
      S.players.forEach(p=>p.timeline.push(draw()));
      S.cur=0; newTurn();
    });
    on("reset", ()=>{ S.screen="setup"; render(); });
  }
}

render();
</script>
</body>
</html>
